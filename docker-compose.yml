version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: sniper
      POSTGRES_PASSWORD: sniper123
      POSTGRES_DB: sniper
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: 
      context: ./backend
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://sniper:sniper123@postgres:5432/sniper
      HELIUS_RPC: ${HELIUS_RPC}
      HELIUS_GRPC: ${HELIUS_GRPC}
      HELIUS_API_KEY: ${HELIUS_API_KEY}
      PRIVATE_KEY: ${PRIVATE_KEY}
    ports:
      - "4000:4000"

  frontend:
    build: 
      context: ./frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
